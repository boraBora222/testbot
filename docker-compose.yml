# Этот файл docker-compose предназначен для запуска одного экземпляра бота (bot2).
# Он использует переменные окружения из файла .env для параметризации имен контейнеров,
# сетей, томов, портов и настроек подключения к базам данных, обеспечивая изоляцию.

services:
  mongo: # Переименовано с mongodb для краткости
    image: mongo:7
    container_name: ${BOT_NAME:-bot}_mongo # Параметризованное имя контейнера (с дефолтом)
    ports:
      - "27017:27017" # Публикация MongoDB на хост
    volumes:
      - mongo_data:/data/db # Ссылка на статично определенный том ниже
    networks:
      - default # Ссылка на статично определенную сеть ниже
    restart: unless-stopped
    # Mongo доступен с хоста на 27017

  redis:
    image: redis:7-alpine
    container_name: ${BOT_NAME:-bot}_redis # Параметризованное имя контейнера (с дефолтом)
    networks:
      - default # Ссылка на статично определенную сеть ниже
    restart: unless-stopped
    # Внешние порты удалены для изоляции, доступ внутри сети Docker

  minio:
    image: minio/minio
    container_name: ${BOT_NAME:-bot}_minio
    environment:
      MINIO_ROOT_USER: ${DOCUMENT_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${DOCUMENT_STORAGE_SECRET_KEY:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - default
    restart: unless-stopped

  minio-setup:
    image: minio/mc
    container_name: ${BOT_NAME:-bot}_minio_setup
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${DOCUMENT_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${DOCUMENT_STORAGE_SECRET_KEY:-minioadmin123}
      DOCUMENT_STORAGE_BUCKET: ${DOCUMENT_STORAGE_BUCKET:-documents}
    entrypoint:
      - /bin/sh
      - -c
      - >-
        set -eu;
        : "$${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}";
        : "$${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}";
        : "$${DOCUMENT_STORAGE_BUCKET:?DOCUMENT_STORAGE_BUCKET is required}";
        until (/usr/bin/mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD");
        do sleep 1; done;
        /usr/bin/mc mb --ignore-existing local/"$$DOCUMENT_STORAGE_BUCKET";
    networks:
      - default
    restart: "no"

  bot: # Переименовано с telegram_bot
    build:
      context: . # Контекст сборки - текущая директория (bot2/)
      dockerfile: bot/Dockerfile # Путь к Dockerfile относительно контекста (.)
    container_name: ${BOT_NAME:-bot}_bot # Параметризованное имя контейнера (с дефолтом)
    env_file:
      - ${ENV_FILE:-.env}
    depends_on:
      - mongo # Обновленное имя зависимости
      - redis
      - minio
    restart: unless-stopped
    volumes:
      # Пути монтирования относительно контекста (.)
      - ./bot:/app/bot
      - ./shared:/app/shared
    networks:
      - default # Ссылка на статично определенную сеть ниже

  web: # Переименовано с web_interface
    build:
      context: . # Контекст сборки - текущая директория (bot2/)
      dockerfile: web/Dockerfile # Путь к Dockerfile относительно контекста (.)
    container_name: ${BOT_NAME:-bot}_web # Параметризованное имя контейнера (с дефолтом)
    env_file:
      - ${ENV_FILE:-.env}
    ports:
      # Маппинг внешнего порта (из .env) на внутренний порт FastAPI (8000)
      - "${WEB_PORT:-8071}:8000"
    depends_on:
      - mongo # Обновленное имя зависимости
      - redis
      - minio
    restart: unless-stopped
    volumes:
      # Пути монтирования относительно контекста (.)
      - ./web:/app/web
      - ./shared:/app/shared
    networks:
      - default # Ссылка на статично определенную сеть ниже

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_WEB_BASE_URL: ${FRONT_BASE_URL}
        VITE_MONGO_DB_NAME: ${MONGO_DB_NAME}
    container_name: ${BOT_NAME:-bot}_front
    depends_on:
      - web
    ports:
      - "5138:5138"
    restart: unless-stopped
    networks:
      - default

volumes:
  mongo_data: {} # Статичное имя тома. Docker Compose добавит префикс проекта (bot2_)
  minio_data: {}

networks:
  default: # Статичное имя сети. Docker Compose создаст сеть bot2_default
    driver: bridge # Стандартный драйвер bridge
